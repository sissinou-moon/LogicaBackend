<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Chat</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0d0d0d;
            color: white;
        }

        #chat {
            max-width: 800px;
            margin: auto;
            padding: 20px;
        }

        .msg {
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            white-space: pre-wrap;
        }

        .user {
            background: #1f3b5c;
            text-align: right;
        }

        .ai {
            background: #1a1a1a;
        }

        .think {
            font-size: 13px;
            color: #aaa;
            border-left: 2px solid #555;
            padding-left: 10px;
            margin: 5px 0;
            display: block;
        }

        .inputBox {
            display: flex;
            margin-top: 20px;
        }

        input {
            flex: 1;
            padding: 10px;
            background: #1c1c1c;
            border: none;
            color: white;
        }

        button {
            padding: 10px 15px;
            background: #4ea1ff;
            border: none;
            color: white;
        }
    </style>
</head>

<body>

    <div id="chat"></div>

    <div class="inputBox" style="max-width:800px;margin:auto;">
        <input id="input" placeholder="Type..." />
        <button onclick="send()">Send</button>
    </div>

    <script>
        const chat = document.getElementById("chat");

        async function stream(message) {

            const res = await fetch("http://127.0.0.1:8000/api/v2/chat/stream", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ message, stream: true })
            });

            if (!res.body) {
                console.error("No stream body");
                return;
            }

            const reader = res.body.getReader();
            const decoder = new TextDecoder();

            let aiMsg = document.createElement("div");
            aiMsg.className = "msg ai";
            chat.appendChild(aiMsg);

            let buffer = "";

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                buffer += decoder.decode(value, { stream: true });

                // 🔥 FIX: safer parsing (line-based instead of \n\n blocks)
                let lines = buffer.split("\n");
                buffer = lines.pop();

                for (let line of lines) {

                    line = line.trim();
                    if (!line.startsWith("data:")) continue;

                    let raw = line.replace("data: ", "").trim();

                    if (!raw) continue;

                    try {
                        const json = JSON.parse(raw);

                        if (json.type === "token") {
                            aiMsg.innerText += json.token;
                        }

                        if (json.type === "status") {
                            console.log("STATUS:", json.step);
                        }

                        if (json.type === "done") {
                            return;
                        }

                    } catch (e) {
                        console.warn("Bad chunk ignored:", raw);
                    }
                }
            }

            // 🔥 flush remaining buffer safely
            try {
                const json = JSON.parse(buffer.replace("data: ", ""));
                if (json.type === "token") {
                    aiMsg.innerText += json.token;
                }
            } catch { }
        }

        function send() {
            const input = document.getElementById("input");
            const text = input.value;

            if (!text) return;

            const div = document.createElement("div");
            div.className = "msg user";
            div.innerText = text;
            chat.appendChild(div);

            input.value = "";

            stream(text);
        }
    </script>

</body>

</html>
